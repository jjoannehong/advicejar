<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Single Page Chat App</title>
        <script type="importmap">
            {
                "imports": {
                    "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.esm-browser.js",
                    "vue-router": "https://cdn.jsdelivr.net/npm/vue-router@5.0.4/dist/vue-router.esm-browser.prod.js"
                }
            }
        </script>
        <link rel="stylesheet" href="./style.css" />
        <script src="./main.js" type="module"></script>
    </head>
    <body>
        <div id="app">Loading...</div>
        <template id="template">
            <header>
                <h1><router-link :to="`/home`">the advice jar</router-link></h1>
                <router-link
                    class="profile-icon-link"
                    :to="`/profile/me`"
                    aria-label="Profile"
                    title="Profile"
                >
                    <span class="profile-icon" aria-hidden="true"></span>
                </router-link>
            </header>

            <main class="app-shell">
                <router-view></router-view>
            </main>
        </template>
    </body>
</html>
