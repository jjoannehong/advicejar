<h2 class="title profile-page-title">
    <template v-if="session && session.actor">your advice</template>
    <template v-else>
        <a href="#" class="profile-login-link" @click.prevent="login">log in</a>
        <span class="profile-login-rest"> to see your advice</span>
    </template>
</h2>

<div v-if="session && session.actor" class="profile-body profile-body--grid">
    <p class="status-text profile-stat profile-stat-given">
        advice given: {{ givenCount }}
    </p>
    <p class="status-text profile-stat profile-stat-saved">
        advice saved: {{ savedAdviceIds.length }}
    </p>

    <!-- Both empty: one row so the two messages align horizontally -->
    <div
        v-if="!givenCount && !savedAdviceIds.length"
        class="profile-empty-pair"
    >
        <div class="advice-card">
            <p>no advice given yet.</p>
        </div>
        <div class="advice-card">
            <p>no saved advice yet.</p>
        </div>
    </div>

    <template v-else>
        <section class="form-view profile-grid-cell">
            <div v-if="!givenCount" class="advice-card">
                <p>no advice given yet.</p>
            </div>
            <ul v-else class="profile-list">
                <li
                    v-for="advice in givenAdvice"
                    :key="advice.id"
                    class="advice-card"
                >
                    <p>"{{ advice.content }}"</p>
                    <p class="chip-label">{{ advice.category }}</p>
                </li>
            </ul>
        </section>

        <section class="form-view profile-grid-cell">
            <div v-if="!savedAdviceIds.length" class="advice-card">
                <p>no saved advice yet.</p>
            </div>
            <ul v-else class="profile-list">
                <li v-for="advice in savedAdvice" :key="advice.id" class="advice-card">
                    <p>"{{ advice.content }}"</p>
                    <p class="chip-label">{{ advice.category }}</p>
                    <save-advice
                        :saved="true"
                        @toggle-save="toggleSaved(advice.id)"
                    ></save-advice>
                </li>
            </ul>
        </section>
    </template>
</div>
